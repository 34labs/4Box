<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Textbook Canvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="cream">
  <div class="h-full flex flex-col p-3 md:p-4 gap-3">
    <!-- Header -->
    <header class="flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-3">
        <h1 class="font-display text-xl md:text-2xl font-semibold tracking-tight" style="color: var(--fg);">Textbook Canvas</h1>
        <span class="text-xs px-2 py-0.5 rounded" style="background: var(--border); color: var(--muted);">v1.2</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="openSettings()" class="btn px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5" style="background: var(--card); border: 1px solid var(--border);" aria-label="Open settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          Settings
        </button>
        <button onclick="shareSession()" class="btn px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5" style="background: var(--accent); color: white;" aria-label="Share session">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
          Share
        </button>
      </div>
    </header>

    <!-- Canvas Grid -->
    <main class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-3 min-h-0" id="canvasGrid">
      <!-- Boxes will be generated by JS -->
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.4);">
    <div class="modal-content w-full max-w-md max-h-[90vh] overflow-y-auto rounded-xl shadow-2xl" style="background: var(--card);">
      <div class="p-5">
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-display text-xl font-semibold">Settings</h2>
          <button onclick="closeSettings()" class="p-1 rounded hover:opacity-70" aria-label="Close settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>

        <!-- Theme -->
        <div class="mb-5">
          <label class="block text-sm font-medium mb-2" style="color: var(--muted);">Theme</label>
          <div class="grid grid-cols-4 gap-2">
            <button onclick="setTheme('cream')" class="theme-btn p-3 rounded-lg border-2" data-theme-btn="cream" style="background: #f5f1e8; border-color: #d9d3c7;">
              <span class="text-xs font-medium" style="color: #2c2825;">Cream</span>
            </button>
            <button onclick="setTheme('white')" class="theme-btn p-3 rounded-lg border-2" data-theme-btn="white" style="background: #fafafa; border-color: #e5e5e5;">
              <span class="text-xs font-medium" style="color: #1a1a1a;">White</span>
            </button>
            <button onclick="setTheme('yellow')" class="theme-btn p-3 rounded-lg border-2" data-theme-btn="yellow" style="background: #fff9c4; border-color: #f0e68c;">
              <span class="text-xs font-medium" style="color: #3d3d00;">Yellow</span>
            </button>
            <button onclick="setTheme('sepia')" class="theme-btn p-3 rounded-lg border-2" data-theme-btn="sepia" style="background: #f4ecd8; border-color: #d4c9b5;">
              <span class="text-xs font-medium" style="color: #3d3425;">Sepia</span>
            </button>
          </div>
        </div>

        <!-- Paper Style -->
        <div class="mb-5">
          <label class="block text-sm font-medium mb-2" style="color: var(--muted);">Paper Style</label>
          <div class="grid grid-cols-3 gap-2">
            <button onclick="setPaperStyle('paper')" class="paper-btn px-3 py-2 rounded-lg text-sm font-medium border-2" data-paper-btn="paper" style="border-color: var(--border);">Lined</button>
            <button onclick="setPaperStyle('grid')" class="paper-btn px-3 py-2 rounded-lg text-sm font-medium border-2" data-paper-btn="grid" style="border-color: var(--border);">Grid</button>
            <button onclick="setPaperStyle('dot')" class="paper-btn px-3 py-2 rounded-lg text-sm font-medium border-2" data-paper-btn="dot" style="border-color: var(--border);">Dotted</button>
          </div>
        </div>

        <!-- Drawing Settings -->
        <div class="mb-5">
          <label class="block text-sm font-medium mb-2" style="color: var(--muted);">Default Brush Size</label>
          <input type="range" id="brushSizeSetting" min="1" max="20" value="3" class="w-full" onchange="updateBrushSize(this.value)">
          <div class="flex justify-between text-xs mt-1" style="color: var(--muted);">
            <span>Fine</span>
            <span id="brushSizeValue">3px</span>
            <span>Thick</span>
          </div>
        </div>

        <!-- Default Color -->
        <div class="mb-5">
          <label class="block text-sm font-medium mb-2" style="color: var(--muted);">Default Ink Color</label>
          <div class="flex gap-2">
            <button onclick="setDefaultColor('#2c2825')" class="w-8 h-8 rounded-full border-2" style="background: #2c2825; border-color: transparent;"></button>
            <button onclick="setDefaultColor('#1a365d')" class="w-8 h-8 rounded-full border-2" style="background: #1a365d; border-color: transparent;"></button>
            <button onclick="setDefaultColor('#c45c3e')" class="w-8 h-8 rounded-full border-2" style="background: #c45c3e; border-color: transparent;"></button>
            <button onclick="setDefaultColor('#2f855a')" class="w-8 h-8 rounded-full border-2" style="background: #2f855a; border-color: transparent;"></button>
            <button onclick="setDefaultColor('#5b21b6')" class="w-8 h-8 rounded-full border-2" style="background: #5b21b6; border-color: transparent;"></button>
            <input type="color" id="customColorPicker" class="w-8 h-8 rounded-full cursor-pointer" style="border: none;" onchange="setDefaultColor(this.value)">
          </div>
        </div>

        <!-- Data Management -->
        <div class="border-t pt-5" style="border-color: var(--border);">
          <label class="block text-sm font-medium mb-3" style="color: var(--muted);">Data Management</label>
          <div class="flex flex-col gap-2">
            <button onclick="exportData()" class="btn w-full px-4 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-2" style="background: var(--card); border: 1px solid var(--border);">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              Export Session
            </button>
            <label class="btn w-full px-4 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-2 cursor-pointer" style="background: var(--card); border: 1px solid var(--border);">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              Import Session
              <input type="file" accept=".json" class="hidden" onchange="importData(event)">
            </label>
            <button onclick="clearAll()" class="btn w-full px-4 py-2 rounded-lg text-sm font-medium" style="background: #fee2e2; color: #991b1b;">
              Clear All
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Share Modal -->
  <div id="shareModal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.4);">
    <div class="modal-content w-full max-w-md rounded-xl shadow-2xl" style="background: var(--card);">
      <div class="p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-display text-xl font-semibold">Share Session</h2>
          <button onclick="closeShare()" class="p-1 rounded hover:opacity-70" aria-label="Close share modal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        <p class="text-sm mb-3" style="color: var(--muted);">Copy this link to share your session.</p>
        <div class="flex gap-2">
          <input type="text" id="shareLink" readonly class="flex-1 px-3 py-2 rounded-lg text-sm" style="background: var(--bg); border: 1px solid var(--border); color: var(--fg);">
          <button onclick="copyShareLink()" class="px-4 py-2 rounded-lg text-sm font-medium" style="background: var(--accent); color: white;">Copy</button>
        </div>
        <p id="shareWarning" class="text-xs mt-2 text-red-500" style="display: none;"></p>
        <p class="text-xs mt-2" style="color: var(--muted);">Note: Large images may make the link too long. Use Export for heavy content.</p>
      </div>
    </div>
  </div>

  <!-- External scripts loaded sequentially -->
  <script src="js/store.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
